# All-corpus benchmark profile — everything we have downloaded
# Classic corpora + cloud + logs + images = ~720 MB across ~800 files
# Runtime: ~20-40 min depending on hardware

id: all
description: "Full benchmark across all downloaded corpora: classic, cloud, logs, images"

corpora:
  - canterbury
  - calgary
  - silesia
  - enwik8
  - loghub2_2k
  - nasa_logs
  - kodak
  - cloud_configs
  - cloud_benchmark

iterations: 3
timeout_seconds: 900
large_file_threshold_mb: 50
large_file_iterations: 1
track1: true
skip_baselines: false

# Backend and level configuration
backends: [zstd, brotli, gzip, lzma, xz, lz4, snappy, lzham, lizard, zlib-ng, openzl, raw]
cpac_levels: [ultrafast, fast, default, high, best]   # baselines auto-matched per level
discovery: false

# Balanced benchmark profile — standard evaluation (~310 MB, a few minutes)
# Covers classic corpora plus Silesia, enwik8, images, and log samples.

id: balanced
description: "Standard benchmark using classic corpora, Silesia, enwik8, images, log samples, and cloud configs"

corpora:
  - canterbury
  - calgary
  - silesia
  - enwik8
  - loghub2_2k
  - nasa_logs
  - cloud_configs
  - kodak

iterations: 3
timeout_seconds: 7200
large_file_threshold_mb: 15
large_file_iterations: 1
large_file_levels: [fast, default, best]               # skip High for >15 MB (High ≈ Default)
very_large_file_threshold_mb: 100
very_large_file_levels: [fast, best]                   # only 2 levels for >100 MB
track1: true
skip_baselines: false

# Backend and level configuration
backends: [zstd, brotli, gzip, lzma, xz, lz4, snappy, lzham, lizard, zlib-ng, openzl, raw]
cpac_levels: [ultrafast, fast, default, high, best]   # baselines auto-matched per level
discovery: false

id: archive
description: "Archive mode benchmark: per-file vs CPAR vs solid CPAR vs tar+compress baselines"

# Test corpora for archive benchmarks — these overlap with existing corpora
# but are benchmarked in archive mode (multi-file at once)
corpora:
  - mixed_configs
  - mixed_logs
  - canterbury
  - silesia

iterations: 1
timeout_seconds: 600
large_file_threshold_mb: 50
large_file_iterations: 1
track1: true
skip_baselines: false

# Backend and level configuration
backends: [zstd, brotli, gzip, lzma, xz, lz4, snappy, lzham, lizard, zlib-ng, openzl, raw]
cpac_levels: [ultrafast, fast, default, high, best]   # baselines auto-matched per level
discovery: false

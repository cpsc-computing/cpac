# VCTK Corpus: English Multi-speaker Corpus for CSTR Voice Cloning Toolkit
# URL: https://datashare.ed.ac.uk/handle/10283/3443

id: vctk
name: "VCTK Corpus"
description: "English multi-speaker speech corpus (110 speakers)"

download_url: "https://datashare.ed.ac.uk/bitstream/handle/10283/3443/VCTK-Corpus-0.92.zip?sequence=2&isAllowed=y"
download_kind: "http_zip"
target_subdir: "audio/vctk"

# Extract FLAC audio files only (no txt transcripts)
extract_paths:
  - "wav48_silence_trimmed/*/*.flac"


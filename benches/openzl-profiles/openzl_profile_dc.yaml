# OpenZL Datacenter Benchmark Profiles
# Run with: shell.ps1 benchmark-external --corpus benches/openzl-corpora
#
# These profiles target datacenter workloads where CPAC's format-aware
# pipeline (MSN + DAG + adaptive backend) provides the largest gains
# over generic compressors like zstd/lz4/gzip.

profiles:
  dc-logs:
    description: "Structured logs (JSON, syslog, access logs)"
    corpus_pattern: "benches/openzl-corpora/logs/**"
    expected_ratio_min: 8.0
    expected_throughput_mbs_min: 200
    codecs: [cpac, zstd, lz4, gzip, xz, snappy]
    cpac_preset: smart
    iterations: 5

  dc-configs:
    description: "Configuration files (YAML, TOML, JSON, XML)"
    corpus_pattern: "benches/openzl-corpora/configs/**"
    expected_ratio_min: 5.0
    expected_throughput_mbs_min: 500
    codecs: [cpac, zstd, brotli, xz, snappy]
    cpac_preset: smart
    iterations: 5

  dc-mixed-archive:
    description: "Mixed archive (code, docs, binaries, images)"
    corpus_pattern: "benches/openzl-corpora/mixed/**"
    expected_ratio_min: 3.0
    expected_throughput_mbs_min: 150
    codecs: [cpac, zstd, lz4, xz, snappy]
    cpac_preset: balanced
    iterations: 3

  dc-large-binary:
    description: "Large binary blobs (DB dumps, VM images)"
    corpus_pattern: "benches/openzl-corpora/large/**"
    min_file_size: 100MB
    expected_throughput_mbs_min: 400
    codecs: [cpac, zstd, lz4, xz, snappy]
    cpac_preset: fast
    cpac_flags: ["--parallel"]
    iterations: 3

  dc-dedup:
    description: "Versioned/backup data with heavy duplication"
    corpus_pattern: "benches/openzl-corpora/dedup/**"
    expected_dedup_ratio_min: 0.3
    codecs: [cpac]
    cpac_flags: ["--dedup"]
    iterations: 3

  dc-streaming:
    description: "Streaming ingestion (Kafka-style messages)"
    corpus_pattern: "benches/openzl-corpora/streaming/**"
    expected_throughput_mbs_min: 300
    codecs: [cpac, zstd, lz4, snappy]
    cpac_preset: fast
    cpac_flags: ["--streaming"]
    iterations: 5

metrics:
  - compression_ratio
  - compress_throughput_mbs
  - decompress_throughput_mbs
  - peak_memory_mb
  - cpu_utilization_percent
  - multithread_scaling_factor

# Cloud benchmark profile — focused on cloud infrastructure configs
# Covers K8s manifests, CloudFormation, Terraform, Helm charts, OTel, Prometheus

id: cloud
description: "Cloud infrastructure benchmark: JSON/YAML/HCL configs, IaC templates, K8s manifests"

corpora:
  - cloud_configs
  - cloud_benchmark

iterations: 3
timeout_seconds: 900
large_file_threshold_mb: 50
large_file_iterations: 1
track1: true
skip_baselines: false

modes:
  entropy_backends:
    - zstd
  compression_levels: [3]

metrics:
  compare_baselines: true
  baselines:
    - gzip-9
    - zstd-3
    - brotli-11
  verify_roundtrip: true
  capture_ssr: true
  measure_speed: true

# Full benchmark profile — comprehensive evaluation (~2+ GB, 30-60 min)
# All major corpora including cloud, database, and large text datasets.
# Uses larger variants (enwik9) where available.

id: full
description: "Comprehensive benchmark using all major corpora with larger variants"

corpora:
  - canterbury
  - calgary
  - silesia
  - enwik9
  - loghub2_2k
  - loghub2_full
  - kodak
  - nasa_logs
  - digitalcorpora
  - cloud_configs
  - docker_layers
  - database_dumps
  - json_apis
  - github_events_large
  - musan
  - vctk
  - librispeech

iterations: 10
timeout_seconds: 600
track1: true
skip_baselines: false

modes:
  entropy_backends:
    - zstd
    - brotli
    - gzip
    - lzma
  compression_levels: [1, 3, 6, 9, 12, 19]

metrics:
  compare_baselines: true
  baselines:
    - gzip-9
    - zstd-3
    - brotli-11
    - lzma-6
  verify_roundtrip: true
  capture_ssr: true
  measure_speed: true

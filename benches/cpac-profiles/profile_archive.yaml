id: archive
description: "Archive mode benchmark: per-file vs CPAR vs solid CPAR vs tar+compress baselines"

# Test corpora for archive benchmarks — these overlap with existing corpora
# but are benchmarked in archive mode (multi-file at once)
corpora:
  - mixed_configs
  - mixed_logs
  - canterbury
  - silesia

iterations: 1
timeout_seconds: 600
large_file_threshold_mb: 50
large_file_iterations: 1
track1: true
skip_baselines: false

modes:
  entropy_backends:
    - zstd
  compression_levels: [3]

# Archive-specific metrics
archive_modes:
  - per_file           # compress each file independently, sum sizes
  - cpar               # compress into CPAR archive (per-file blocks)
  - cpar_solid         # compress into CPAR solid archive (concatenated stream)
  - concat_compress    # cat all files, compress as single blob (upper bound)
  - tar_zstd           # tar | zstd-3 baseline
  - tar_gzip           # tar | gzip-9 baseline

metrics:
  compare_baselines: true
  baselines:
    - zstd-3
  verify_roundtrip: true
  measure_speed: true

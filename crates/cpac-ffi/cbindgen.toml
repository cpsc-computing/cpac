# cbindgen configuration for cpac-ffi
language = "C"
header = """/* Copyright (c) 2026 BitConcepts, LLC
 * SPDX-License-Identifier: LicenseRef-CPAC-Research-Evaluation-1.0
 *
 * CPAC C/C++ API
 * 
 * This header provides C-compatible bindings for the CPAC compression engine.
 * All functions are thread-safe unless otherwise noted.
 */"""
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
namespace = "cpac"
cpp_compat = true
style = "both"

[export]
include = ["CpacErrorCode", "CpacBackend", "CpacCompressConfig", "CpacCompressor", "CpacDecompressor"]

[export.rename]
"CpacErrorCode" = "cpac_error_code"
"CpacBackend" = "cpac_backend"
"CpacCompressConfig" = "cpac_compress_config"
"CpacCompressor" = "cpac_compressor"
"CpacDecompressor" = "cpac_decompressor"

[fn]
prefix = "cpac_"
rename_args = "GeckoCase"

[struct]
rename_fields = "SnakeCase"

[enum]
rename_variants = "ScreamingSnakeCase"

[defines]
"target_family = windows" = "CPAC_WINDOWS"
"target_family = unix" = "CPAC_UNIX"
